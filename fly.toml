app = "hambacher-schloss"
primary_region = "fra"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DB_PATH = "/data/footprints.db"

[mounts]
  source = "hambacher_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
