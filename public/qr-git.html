<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR (GitHub) - Hambacher Schloss</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 40px 20px;
      gap: 24px;
    }
    h1 { font-size: 28px; color: #1a1a2e; text-align: center; }
    p  { font-size: 15px; color: #555; text-align: center; max-width: 320px; line-height: 1.5; }
    #qr-box {
      background: #fff;
      padding: 20px;
      border: 3px solid #1a1a2e;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
    }
    #url-display {
      font-size: 13px; color: #888;
      word-break: break-all; text-align: center;
      max-width: 340px;
    }
    .footer {
      font-size: 22px; font-weight: 700;
      color: #1a1a2e; letter-spacing: 1px;
    }
    @media print {
      body { justify-content: flex-start; padding-top: 60px; }
      .no-print { display: none; }
    }
    button {
      padding: 10px 24px; font-size: 14px;
      background: #1a1a2e; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="footer">Hambacher Schloss</div>
  <h1>Hinterlasse deine<br>digitale Fußspur</h1>
  <p>QR-Code scannen, AR-Ansicht öffnet sich, Fußspur im Raum hinterlassen</p>

  <div id="qr-box">
    <div id="qr"></div>
  </div>

  <div id="url-display">-</div>

  <button class="no-print" onclick="window.print()">Drucken / Als PDF speichern</button>

  <script>
    // Feste GitHub-Pages-URL (stabil, leitet auf den aktuellen Tunnel um).
    const target = 'https://henry206-git.github.io/Hambacher';
    document.getElementById('url-display').textContent = target;

    new QRCode(document.getElementById('qr'), {
      text:          target,
      width:         260,
      height:        260,
      colorDark:     '#1a1a2e',
      colorLight:    '#ffffff',
      correctLevel:  QRCode.CorrectLevel.M,
    });
  </script>
</body>
</html>
