<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hambacher Schloss – Digitale Handabdrücke</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <script>
  /* ════════════════════════════════════════════════
     GLSL – Hologramm-Shader
     Additive Blending: die Farbe wird zum Hintergrund
     addiert → echter Glow-Effekt auf dunklem Boden
  ════════════════════════════════════════════════ */
  const HOLO_VERT = /* glsl */`
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }`;

  const HOLO_FRAG = /* glsl */`
    precision highp float;
    uniform float     time;
    uniform vec3      glowColor;
    uniform sampler2D footTex;
    varying vec2 vUv;

    void main(){
      vec4 tex = texture2D(footTex, vUv);
      if(tex.a < 0.04) discard;

      /* -- Scanlines (horizontale Linien, wandern nach oben) -- */
      float scan = sin(vUv.y * 90.0 - time * 5.5) * 0.5 + 0.5;
      scan = 0.55 + pow(scan, 2.5) * 0.45;

      /* -- Sweep-Licht (heller Streifen läuft durch) -- */
      float sp  = fract(time * 0.28);
      float sw  = smoothstep(0.0, 0.06, fract(vUv.y - sp))
                * smoothstep(0.16, 0.06, fract(vUv.y - sp));

      /* -- Atemrhythmus (Pulse) -- */
      float pulse = sin(time * 2.1) * 0.08 + 0.92;

      /* -- Flimmern (Glitch) -- */
      float flicker = sin(time * 61.3) * sin(time * 19.7) * 0.04 + 0.96;

      /* -- Rand-Glow -- */
      float ex = 1.0 - abs(vUv.x - 0.5)*2.0;
      float ey = 1.0 - abs(vUv.y - 0.5)*2.0;
      float rim = pow(1.0 - min(ex, ey), 3.5) * 0.6;

      /* -- Finale Farbe -- */
      vec3 col = glowColor * (scan + rim) + vec3(sw * 0.55);
      float alpha = tex.a * scan * pulse * flicker;

      gl_FragColor = vec4(col, alpha);
    }`;


  /* ════════════════════════════════════════════════
     A-Frame Komponente: holo-mat
     Wendet den Hologramm-Shader auf ein Mesh an.
  ════════════════════════════════════════════════ */
  AFRAME.registerComponent('holo-mat', {
    schema: { color: { default: '#00bfff' } },
    init: function () {
      this.uniforms = {
        time:      { value: 0 },
        glowColor: { value: new THREE.Color(this.data.color) },
        footTex:   { value: new THREE.Texture() },
      };
      this.mat = new THREE.ShaderMaterial({
        uniforms:       this.uniforms,
        vertexShader:   HOLO_VERT,
        fragmentShader: HOLO_FRAG,
        transparent:    true,
        blending:       THREE.AdditiveBlending,
        side:           THREE.DoubleSide,
        depthWrite:     false,
      });
      this._apply();
      this.el.addEventListener('object3dset', () => this._apply());
    },
    _apply: function () {
      const mesh = this.el.getObject3D('mesh');
      if (mesh) mesh.traverse(c => { if (c.isMesh) c.material = this.mat; });
    },
    setTexture: function (canvas) {
      const t = new THREE.CanvasTexture(canvas);
      t.needsUpdate = true;
      this.uniforms.footTex.value = t;
    },
    update: function () {
      this.uniforms.glowColor.value.set(this.data.color);
    },
    tick: function (t) { this.uniforms.time.value = t / 1000; },
  });

  /* ════════════════════════════════════════════════
     A-Frame Komponente: pulse-ring
     Pulsierender Leuchtring um jeden Handabdruck.
  ════════════════════════════════════════════════ */
  AFRAME.registerComponent('pulse-ring', {
    schema: { color: { default: '#00bfff' }, r: { default: 0.3 } },
    init: function () {
      this.mat = new THREE.MeshBasicMaterial({
        color:       new THREE.Color(this.data.color),
        transparent: true, opacity: 0.8,
        blending:    THREE.AdditiveBlending,
        depthWrite:  false,
      });
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(this.data.r, 0.007, 8, 80),
        this.mat
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.003;
      this.el.object3D.add(ring);
      this._ring = ring;
    },
    tick: function (t) {
      const f = t / 1000;
      const s = 1.0 + Math.sin(f * 2.6) * 0.07;
      this._ring.scale.set(s, s, s);
      this.mat.opacity = 0.35 + Math.sin(f * 2.6 + 1.0) * 0.35;
    },
  });

  /* ════════════════════════════════════════════════
     A-Frame Komponente: billboard
     Element schaut immer zur Kamera.
  ════════════════════════════════════════════════ */
  AFRAME.registerComponent('billboard', {
    init: function () { this._v = new THREE.Vector3(); },
    tick: function () {
      const cam = document.getElementById('cam3d');
      if (!cam) return;
      cam.object3D.getWorldPosition(this._v);
      this.el.object3D.lookAt(this._v);
    },
  });

  /* ════════════════════════════════════════════════
     GLSL – Reticle-Shader (Boden-Erkennungsring)
  ════════════════════════════════════════════════ */
  const RETICLE_FRAG = /* glsl */`
    precision highp float;
    uniform float time;
    uniform vec3  color;
    varying vec2  vUv;

    void main(){
      vec2  c    = vUv - 0.5;
      float dist = length(c);
      float ring = smoothstep(0.47,0.46,dist) * smoothstep(0.38,0.42,dist);
      float dash = step(0.5, fract(atan(c.y,c.x)/(3.14159*2.0)*8.0 - time*1.5));
      float inner= smoothstep(0.08,0.07,dist);
      float pulse= sin(time*3.0)*0.15+0.85;
      float alpha= (ring*dash*0.9 + inner*0.7) * pulse;
      gl_FragColor = vec4(color * (1.0 + ring*0.5), alpha);
    }`;

  /* ════════════════════════════════════════════════
     A-Frame Komponente: reticle-mat
     Animierter Erkennungsring (WebXR hit-test).
  ════════════════════════════════════════════════ */
  AFRAME.registerComponent('reticle-mat', {
    init: function () {
      this.u = { time: { value: 0 }, color: { value: new THREE.Color('#00ffcc') } };
      const mat = new THREE.ShaderMaterial({
        uniforms:       this.u,
        vertexShader:   HOLO_VERT,
        fragmentShader: RETICLE_FRAG,
        transparent:    true,
        blending:       THREE.AdditiveBlending,
        side:           THREE.DoubleSide,
        depthWrite:     false,
      });
      this.el.addEventListener('object3dset', () => {
        const m = this.el.getObject3D('mesh');
        if (m) m.traverse(c => { if (c.isMesh) c.material = mat; });
      });
    },
    tick: function (t) { this.u.time.value = t / 1000; },
  });

  /* ════════════════════════════════════════════════
     A-Frame Komponente: ar-hit-test
     WebXR Flächenerkennung – bewegt Reticle auf
     erkannte Flächen (Boden, Wände, Objekte).
  ════════════════════════════════════════════════ */
  AFRAME.registerComponent('ar-hit-test', {
    init: function () {
      this.hitTestSource = null;
      this.el.sceneEl.addEventListener('enter-vr', () => this._setup());
      this.el.sceneEl.addEventListener('exit-vr',  () => { this.hitTestSource = null; });
    },
    _setup: async function () {
      const session = this.el.sceneEl.renderer.xr.getSession();
      if (!session) return;
      try {
        const vs = await session.requestReferenceSpace('viewer');
        this.hitTestSource = await session.requestHitTestSource({ space: vs });
        session.addEventListener('end', () => { this.hitTestSource = null; });
      } catch (e) { console.warn('hit-test unavailable', e); }
    },
    tick: function () {
      if (!this.hitTestSource) return;
      const xr     = this.el.sceneEl.renderer.xr;
      const frame  = xr.getFrame?.();
      if (!frame) return;
      const ref     = xr.getReferenceSpace();
      const results = frame.getHitTestResults(this.hitTestSource);
      const reticle = document.getElementById('reticle');
      if (!reticle) return;
      if (results.length) {
        const pose = results[0].getPose(ref);
        if (pose) {
          const p = pose.transform.position;
          reticle.object3D.position.set(p.x, p.y + 0.002, p.z);
          reticle.setAttribute('visible', true);
        }
      } else {
        reticle.setAttribute('visible', false);
      }
    },
  });
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #fallback-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }

    a-scene {
      position: fixed !important; inset: 0 !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    /* UI on top of everything (also WebXR dom-overlay) */
    #ui {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    #header {
      pointer-events: auto;
      background: rgba(4,4,20,0.92);
      backdrop-filter: blur(8px);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(0,200,255,0.25);
      flex-shrink: 0;
    }
    #header h1 { font-size: 15px; font-weight: 600; color: #a0e4ff; letter-spacing: .3px; }
    #header small { font-size: 11px; color: #557; display: block; }

    /* ── AR stage (transparent middle) ── */
    .ar-stage { flex: 1; position: relative; }

    #badge {
      position: absolute; top: 10px; right: 12px;
      background: rgba(0,10,30,0.75);
      border: 1px solid rgba(0,200,255,0.2);
      border-radius: 20px;
      padding: 4px 14px; font-size: 12px; color: #7af;
    }

    #mode-badge {
      position: absolute; bottom: 10px; left: 12px;
      background: rgba(0,10,30,0.65);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 3px 10px; font-size: 11px; color: #557;
    }

    /* ── Reset-Tracking-Button ── */
    #reset-btn {
      position: absolute; bottom: 10px; right: 12px;
      background: rgba(0,10,30,0.75);
      border: 1px solid rgba(0,200,255,0.25);
      border-radius: 10px;
      padding: 5px 12px;
      font-size: 12px; color: #7af;
      cursor: pointer; pointer-events: auto;
      display: flex; align-items: center; gap: 5px;
      transition: background .15s, border-color .15s;
    }
    #reset-btn:active { background: rgba(0,150,255,0.2); border-color: rgba(0,200,255,0.6); }

    #toast {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,200,120,0.9);
      color: #fff; padding: 8px 22px;
      border-radius: 22px; font-size: 14px;
      opacity: 0; transition: opacity .3s;
      pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Bottom Sheet ── */
    #sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 200;
      pointer-events: auto;

      background: rgba(4,6,24,0.97);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(0,200,255,0.18);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);

      /* Snap animation */
      transition: transform 0.38s cubic-bezier(0.32,0.72,0,1);
      will-change: transform;
      touch-action: none;

      /* iPhone home-bar + notch */
      padding-bottom: max(env(safe-area-inset-bottom), 10px);
    }

    /* Collapsed: only handle + peek row visible (~58px) */
    #sheet.collapsed { transform: translateY(calc(100% - 58px)); }

    /* Drag handle */
    #sheet-handle {
      width: 40px; height: 4px;
      background: rgba(0,200,255,0.25);
      border-radius: 2px;
      margin: 10px auto 0;
      cursor: grab;
      flex-shrink: 0;
    }

    /* Peek row – always visible, triggers expand */
    #sheet-peek {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 10px;
      cursor: pointer; user-select: none;
    }
    #sheet-peek-label {
      flex: 1; font-size: 14px; font-weight: 600;
      color: #7af; letter-spacing: .3px;
    }
    #sheet-peek-count {
      font-size: 12px; color: #446;
      background: rgba(0,200,255,0.08);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 12px; padding: 2px 10px;
    }
    #sheet-chevron {
      font-size: 14px; color: #446;
      transition: transform 0.3s;
    }
    #sheet.collapsed #sheet-chevron { transform: rotate(180deg); }

    /* Expandable body */
    #sheet-body {
      padding: 4px 16px 8px;
      overflow: hidden;
    }

    /* Inputs */
    .row { display: flex; gap: 8px; margin-bottom: 10px; }

    input[type="text"] {
      flex: 1; min-width: 0;
      background: rgba(0,200,255,0.05);
      border: 1px solid rgba(0,200,255,0.15);
      border-radius: 10px;
      padding: 10px 13px; color: #cef;
      font-size: 15px;
      /* Prevent iOS zoom on focus */
      font-size: max(16px, 15px);
    }
    input[type="text"]::placeholder { color: #335; }
    input[type="text"]:focus { outline: none; border-color: rgba(0,200,255,0.5); }
    input[type="text"].error { border-color: #f55; }

    /* Color picker */
    .colors {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      margin-bottom: 10px;
    }
    .cb {
      aspect-ratio: 1; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      min-width: 0;
    }
    .cb.on { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 10px currentColor; }

    /* Size slider */
    .size-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .size-row label { font-size: 12px; color: #446; white-space: nowrap; }
    input[type="range"] { flex: 1; accent-color: #0af; height: 4px; }

    /* Add button */
    #add-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #0af, #09f);
      border: none; border-radius: 12px;
      color: #000; font-weight: 700; font-size: 16px;
      cursor: pointer; letter-spacing: .3px;
      box-shadow: 0 0 24px rgba(0,180,255,0.3);
      /* Minimum touch target */
      min-height: 48px;
    }
    #add-btn:active { opacity: .82; }
  </style>
</head>
<body>

<!-- Kamera-Feed (Fallback / Gyro-Modus) -->
<video id="fallback-video" autoplay playsinline muted></video>

<!-- A-Frame Szene -->
<a-scene
  vr-mode-ui="enabled: false"
  renderer="alpha: true; antialias: true; colorManagement: true; sortObjects: true"
  loading-screen="enabled: false"
  device-orientation-permission-ui="enabled: false"
  webxr="requiredFeatures: local; optionalFeatures: local-floor,dom-overlay,hit-test; overlayElement: #ui;"
  ar-hit-test
>
  <a-camera
    id="cam3d"
    position="0 1.5 0"
    look-controls="pointerLockEnabled: false; magicWindowTrackingEnabled: true; touchEnabled: false"
    wasd-controls="enabled: false"
    cursor="rayOrigin: mouse; fuse: false"
    raycaster="objects: .fp-plane; far: 20"
  ></a-camera>

  <!-- Flächenerkennungs-Ring (WebXR hit-test) -->
  <a-entity id="reticle" visible="false">
    <a-plane width="0.4" height="0.4" rotation="-90 0 0" reticle-mat></a-plane>
  </a-entity>

  <!-- Handabdrücke Container -->
  <a-entity id="fp-root"></a-entity>

  <!-- Hologramm-Gitter -->
  <a-entity id="grid-root"></a-entity>
</a-scene>

<!-- UI Overlay -->
<div id="ui">
  <div id="header">
    <div style="font-size:22px">🏰</div>
    <div>
      <h1>Hambacher Schloss</h1>
      <small>Ausstellung 1 · Schau an die Wand</small>
    </div>
  </div>

  <div class="ar-stage">
    <div id="badge">Lade Handabdrücke…</div>
    <div id="toast">Handabdruck hinterlassen! 🖐️</div>
    <div id="mode-badge">· · ·</div>
    <button id="reset-btn" title="Tracking zurücksetzen">↺ Reset</button>
  </div>

  <!-- Bottom Sheet (innerhalb #ui für dom-overlay) -->
  <div id="sheet" class="collapsed">
  <div id="sheet-handle"></div>

  <div id="sheet-peek">
    <span id="sheet-peek-label">🖐️ Handabdruck hinterlassen</span>
    <span id="sheet-peek-count">0 Abdrücke</span>
    <span id="sheet-chevron">▲</span>
  </div>

  <div id="sheet-body">
    <div class="row">
      <input type="text" id="inp-name" placeholder="Dein Name *" maxlength="20">
      <input type="text" id="inp-msg"  placeholder="Nachricht (optional)" maxlength="36">
    </div>
    <div class="colors" id="colors"></div>
    <div class="size-row">
      <label>Größe</label>
      <input type="range" id="size-sl" min="0.6" max="1.5" step="0.1" value="1.0">
    </div>
    <button id="add-btn">🖐️ Handabdruck hinterlassen</button>
  </div>

  <!-- Tap-to-reveal Popup (innerhalb #ui für dom-overlay) -->
  <div id="msg-popup" style="
  display:none; position:fixed; z-index:300;
  bottom: 80px; left:50%; transform:translateX(-50%);
  background:rgba(4,6,24,0.97); backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,200,255,0.25); border-radius:16px;
  padding:16px 22px; min-width:220px; max-width:80vw;
  text-align:center; pointer-events:auto;
  box-shadow: 0 0 30px rgba(0,180,255,0.2);
">
  <div id="popup-name" style="font-size:16px;font-weight:700;color:#7af;margin-bottom:6px;"></div>
  <div id="popup-msg"  style="font-size:14px;color:#cef;line-height:1.5;"></div>
  <button id="popup-close" style="
    margin-top:12px; padding:6px 18px;
    background:rgba(0,200,255,0.12); border:1px solid rgba(0,200,255,0.2);
    border-radius:8px; color:#7af; font-size:13px; cursor:pointer;
  ">Schließen</button>
  </div>

</div>

<script>
/* ─── Konfiguration ─── */
const EXHIBITION_ID = '1';
const COLORS = [
  '#00cfff','#ff3dac','#39ff14','#ff6b00',
  '#bf00ff','#ffec00','#ff2244','#00ffcc',
  '#ff9500','#ffffff',
];
let selectedColor = COLORS[0];
const renderedIds  = new Set();
const sceneEl      = document.querySelector('a-scene');

/* ─── Handabdruck-Canvas zeichnen ─── */
function makeHandCanvas(baseColor) {
  const W = 300, H = 380;
  const cv  = document.createElement('canvas');
  cv.width  = W; cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W/2);
  grd.addColorStop(0, hexAlpha(baseColor, 0.18));
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  drawOneHand(ctx, W/2, H * 0.58, 95, baseColor);
  return cv;
}

function hexAlpha(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function drawOneHand(ctx, cx, cy, s, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.shadowColor = color;
  ctx.shadowBlur  = 18;
  ctx.fillStyle   = '#fff';

  // Handfläche
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.38, s * 0.40, 0, 0, Math.PI * 2);
  ctx.fill();

  // Handgelenk
  ctx.beginPath();
  ctx.ellipse(0, s * 0.48, s * 0.22, s * 0.14, 0, 0, Math.PI * 2);
  ctx.fill();

  // 4 Finger (Zeige-, Mittel-, Ring-, Kleinfinger)
  const fX   = [-0.23, -0.08,  0.08,  0.23];
  const fLen = [ 0.46,  0.52,  0.48,  0.36];
  const fW   = [0.085, 0.095, 0.085, 0.070];
  for (let i = 0; i < 4; i++) {
    const topY = -s * 0.38 - s * fLen[i];
    const midY = -s * 0.38 - s * fLen[i] / 2;
    ctx.beginPath();
    ctx.ellipse(fX[i] * s, midY, fW[i] * s, s * fLen[i] / 2 + s * 0.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fX[i] * s, topY, fW[i] * s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Daumen (schräg links)
  ctx.save();
  ctx.rotate(0.45);
  ctx.beginPath();
  ctx.ellipse(-s * 0.38, -s * 0.08, s * 0.075, s * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-s * 0.38, -s * 0.27, s * 0.075, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Konturlinie (Hologramm-Detail)
  ctx.strokeStyle = color;
  ctx.lineWidth   = 1.5;
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.37, s * 0.39, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.restore();
}

/* ─── Handabdruck in die Szene einsetzen ─── */
function spawnHandprint(fp) {
  if (renderedIds.has(fp.id)) return;
  renderedIds.add(fp.id);

  const sz  = fp.size || 1.0;
  const W   = 0.50 * sz;
  const H   = W * (380 / 300);
  const col = fp.color || '#00cfff';
  const y   = fp.y != null ? fp.y : 0;

  const wrap = document.createElement('a-entity');
  wrap.setAttribute('position', `${fp.x} ${y} ${fp.z}`);
  wrap.setAttribute('rotation', `0 ${-(fp.rotation || 0)} 0`);
  wrap.setAttribute('animation__spawn',
    'property: scale; from: 0 0 0; to: 1 1 1; dur: 700; easing: easeOutElastic;');

  /* -- Hologramm Handabdruck (flach auf Boden) -- */
  const plane = document.createElement('a-plane');
  plane.setAttribute('width',    W);
  plane.setAttribute('height',   H);
  plane.setAttribute('rotation', '-90 0 0');
  plane.setAttribute('position', '0 0.004 0');
  plane.setAttribute('holo-mat', `color: ${col}`);
  plane.classList.add('fp-plane');

  plane.addEventListener('loaded', () => {
    const comp = plane.components['holo-mat'];
    if (comp) comp.setTexture(makeHandCanvas(col));
  });
  plane.addEventListener('click', () => showPopup(fp));
  wrap.appendChild(plane);

  /* -- Pulsierender Glow-Ring -- */
  const ring = document.createElement('a-entity');
  ring.setAttribute('pulse-ring', `color: ${col}; r: ${0.28 * sz}`);
  wrap.appendChild(ring);

  /* -- Äußerer statischer Ring -- */
  const outerRing = document.createElement('a-torus');
  outerRing.setAttribute('radius',        0.34 * sz);
  outerRing.setAttribute('radius-tubular', 0.004);
  outerRing.setAttribute('rotation',      '-90 0 0');
  outerRing.setAttribute('position',      '0 0.002 0');
  outerRing.setAttribute('material',
    `color: ${col}; transparent: true; opacity: 0.25;
     emissive: ${col}; emissiveIntensity: 0.8;
     blending: additive; depthWrite: false;`);
  wrap.appendChild(outerRing);

  /* -- Name-Label (Billboard, schwebt über Handabdruck) -- */
  const labelWrap = document.createElement('a-entity');
  labelWrap.setAttribute('position', `0 0.22 0`);
  labelWrap.setAttribute('billboard', '');

  const lblW = Math.min(0.65, 0.12 + fp.name.length * 0.025) * sz;

  const lblBg = document.createElement('a-plane');
  lblBg.setAttribute('width',  lblW);
  lblBg.setAttribute('height', '0.09');
  lblBg.setAttribute('material',
    `color: #000820; transparent: true; opacity: 0.7;
     emissive: ${col}; emissiveIntensity: 0.05;`);

  const lblBorder = document.createElement('a-plane');
  lblBorder.setAttribute('width',  lblW + 0.01);
  lblBorder.setAttribute('height', '0.10');
  lblBorder.setAttribute('position', '0 0 -0.001');
  lblBorder.setAttribute('material',
    `color: ${col}; transparent: true; opacity: 0.35;
     blending: additive; depthWrite: false;`);

  const lblName = document.createElement('a-text');
  lblName.setAttribute('value', fp.name);
  lblName.setAttribute('align', 'center');
  lblName.setAttribute('color', col);
  lblName.setAttribute('width', lblW * 3.5);
  lblName.setAttribute('position', '0 0 0.002');
  lblName.setAttribute('wrap-count', 18);

  labelWrap.appendChild(lblBorder);
  labelWrap.appendChild(lblBg);
  labelWrap.appendChild(lblName);

  wrap.appendChild(labelWrap);
  document.getElementById('fp-root').appendChild(wrap);
}

/* ─── Hologramm-Gitter ─── */
function buildGrid() {
  const root = document.getElementById('grid-root');
  const step = 0.5, r = 5;
  function line(s, e) {
    const el = document.createElement('a-entity');
    el.setAttribute('line', `start: ${s}; end: ${e}; color: #0af; opacity: 0.06`);
    root.appendChild(el);
  }
  for (let x = -r; x <= r; x += step) line(`${x} 0 ${-r}`, `${x} 0 ${r}`);
  for (let z = -r; z <= r; z += step) line(`${-r} 0 ${z}`, `${r} 0 ${z}`);
}

/* ─── Handabdrücke laden ─── */
async function loadFootprints() {
  try {
    const data = await fetch(`/api/footprints/${EXHIBITION_ID}`).then(r => r.json());
    data.forEach(spawnHandprint);
    document.getElementById('badge').textContent = `${data.length} Handabdrücke`;
    const sc = document.getElementById('sheet-peek-count');
    if (sc) sc.textContent = `${data.length} Abdrücke`;
  } catch (e) { console.warn('load error', e); }
}

/* ─── Kamera starten (Gyro-Fallback) ─── */
function startFallbackCamera() {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 } }, audio: false,
  }).then(s => { document.getElementById('fallback-video').srcObject = s; }).catch(() => {});

  function applyAlpha() { sceneEl.renderer.setClearColor(0x000000, 0); }
  if (sceneEl.renderer) applyAlpha();
  else sceneEl.addEventListener('renderstart', applyAlpha, { once: true });
}

/* ─── Init ─── */
async function init() {
  const modeBadge    = document.getElementById('mode-badge');
  const needsIOSPerm = typeof DeviceOrientationEvent?.requestPermission === 'function';

  const hasWebXR = !!(
    navigator.xr &&
    await navigator.xr.isSessionSupported('immersive-ar').catch(() => false)
  );

  if (hasWebXR) {
    modeBadge.textContent = '📡 Tippe zum Starten';
    startFallbackCamera();
    // Browser erfordert User-Gesture für WebXR — erster Tap startet AR
    const startAR = () => {
      modeBadge.textContent = '📡 AR · Flächenerkennung';
      sceneEl.enterAR().catch(() => {});
    };
    document.querySelector('.ar-stage').addEventListener('click',    startAR, { once: true });
    document.querySelector('.ar-stage').addEventListener('touchend', startAR, { once: true });

  } else if (needsIOSPerm) {
    modeBadge.textContent = '📱 iOS · Tippe zum Starten';
    startFallbackCamera();
    document.querySelector('.ar-stage').addEventListener('click', async () => {
      await DeviceOrientationEvent.requestPermission().catch(() => {});
      modeBadge.textContent = '📱 iOS Gyro';
    }, { once: true });

  } else {
    modeBadge.textContent = '📱 Gyro-Modus';
    startFallbackCamera();
  }
}

sceneEl.addEventListener('enter-vr', () => {
  document.getElementById('fallback-video').style.display = 'none';
  document.getElementById('mode-badge').textContent = '📡 AR · Flächenerkennung';
  // In WebXR: Tap via XR-Select-Events, nicht via Maus-Koordinaten
  document.getElementById('cam3d').setAttribute('cursor', 'rayOrigin: xrselect; fuse: false');
});
sceneEl.addEventListener('exit-vr', () => {
  document.getElementById('fallback-video').style.display = '';
  startFallbackCamera();
  document.getElementById('mode-badge').textContent = '📱 Gyro-Modus';
  // Zurück zu Maus/Touch-Koordinaten
  document.getElementById('cam3d').setAttribute('cursor', 'rayOrigin: mouse; fuse: false');
});

/* ─── Popup: Nachricht anzeigen ─── */
let popupTimer = null;

function showPopup(fp) {
  const popup = document.getElementById('msg-popup');
  document.getElementById('popup-name').textContent = fp.name;
  document.getElementById('popup-msg').textContent  =
    fp.message || '(Keine Nachricht hinterlassen)';
  popup.style.display = 'block';
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => { popup.style.display = 'none'; }, 5000);
}

document.getElementById('popup-close').onclick = () => {
  document.getElementById('msg-popup').style.display = 'none';
  clearTimeout(popupTimer);
};

/* ─── Reset-Tracking-Button ─── */
let resetBusy = false;

document.getElementById('reset-btn').onclick = async () => {
  if (resetBusy) return;
  resetBusy = true;

  const btn = document.getElementById('reset-btn');
  btn.textContent = '…';
  btn.style.opacity = '0.5';

  try {
    // look-controls zurücksetzen
    try {
      const cam = document.getElementById('cam3d');
      if (cam && cam.components) {
        const lc = cam.components['look-controls'];
        if (lc) {
          if (lc.yawObject)   lc.yawObject.rotation.y   = 0;
          if (lc.pitchObject) lc.pitchObject.rotation.x = 0;
        }
        if (cam.object3D) {
          cam.object3D.rotation.set(0, 0, 0);
          cam.object3D.quaternion.identity();
        }
      }
    } catch (_) {}

    // Kamera-Stream neu starten
    try {
      const vid = document.getElementById('fallback-video');
      if (vid && vid.srcObject) {
        vid.srcObject.getTracks().forEach(t => { try { t.stop(); } catch(_){} });
        vid.srcObject = null;
      }
    } catch (_) {}

    await new Promise(r => setTimeout(r, 300));
    startFallbackCamera();

    btn.textContent = '✓';
    btn.style.color   = '#0f9';
    btn.style.opacity = '1';
    await new Promise(r => setTimeout(r, 1000));

  } catch (err) {
    console.warn('Reset error:', err);
    btn.textContent = '!';
    btn.style.color = '#f55';
    await new Promise(r => setTimeout(r, 1500));
  }

  btn.innerHTML     = '↺ Reset';
  btn.style.color   = '';
  btn.style.opacity = '';
  resetBusy = false;
};

sceneEl.addEventListener('loaded', () => {
  buildGrid();
  loadFootprints();
  setInterval(loadFootprints, 7000);
  init();
});

/* ─── Bottom Sheet ─── */
(function () {
  const sheet   = document.getElementById('sheet');
  const peek    = document.getElementById('sheet-peek');
  const handle  = document.getElementById('sheet-handle');
  let expanded  = false;
  let dragStart = null;
  let dragY     = 0;

  function setExpanded(val) {
    expanded = val;
    sheet.classList.toggle('collapsed', !val);
  }

  // Tap peek row → expand; tap handle when expanded → collapse
  peek.addEventListener('click', () => { if (!expanded) setExpanded(true); });
  handle.addEventListener('click', () => setExpanded(!expanded));

  // Touch drag on handle
  handle.addEventListener('touchstart', e => {
    dragStart = e.touches[0].clientY;
    dragY = 0;
    sheet.style.transition = 'none';
  }, { passive: true });

  handle.addEventListener('touchmove', e => {
    if (dragStart === null) return;
    dragY = e.touches[0].clientY - dragStart;
    if (dragY > 0) sheet.style.transform = `translateY(${dragY}px)`;
  }, { passive: true });

  handle.addEventListener('touchend', () => {
    sheet.style.transition = '';
    sheet.style.transform  = '';
    if (dragY > 60) setExpanded(false);
    dragStart = null;
  });

  // Close sheet when tapping AR view
  document.getElementById('ui').addEventListener('click', e => {
    if (expanded && e.target === document.querySelector('.ar-stage')) setExpanded(false);
  });
})();

/* ─── Farbauswahl ─── */
const colorsEl = document.getElementById('colors');
COLORS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cb' + (c === selectedColor ? ' on' : '');
  btn.style.background = c;
  btn.style.setProperty('color', c);
  btn.onclick = () => {
    document.querySelectorAll('.cb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    selectedColor = c;
  };
  colorsEl.appendChild(btn);
});

/* ─── Handabdruck hinzufügen ─── */
document.getElementById('add-btn').onclick = async () => {
  const nameEl = document.getElementById('inp-name');
  const name   = nameEl.value.trim();
  if (!name) {
    nameEl.classList.add('error');
    nameEl.focus();
    setTimeout(() => nameEl.classList.remove('error'), 900);
    return;
  }
  const message = document.getElementById('inp-msg').value.trim();
  const size    = parseFloat(document.getElementById('size-sl').value);

  await fetch(`/api/footprints/${EXHIBITION_ID}`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ name, message, color: selectedColor, size }),
  });

  await loadFootprints();
  nameEl.value = '';
  document.getElementById('inp-msg').value = '';

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
};
</script>
