<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hambacher Schloss - AR (8th Wall)</title>

  <!-- 8th Wall: World-Tracking auf iOS Safari UND Android, gratis, kein Key.
       8-Frame (A-Frame-Fork) lokal, Engine/xrextras/landing-page via CDN. -->
  <script crossorigin="anonymous" src="./vendor/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true" data-preload-chunks="slam"></script>

  <script>
  const APP_VERSION   = 'w1 · 8thwall';
  const EXHIBITION_ID = '1';
  const HAND_W        = 1.2;   // Abdruck-Breite in 8th-Wall-Einheiten (~0.2m/Einheit)
  const COLORS = ['#00cfff','#ff3dac','#39ff14','#ff6b00','#bf00ff','#ffec00','#ff2244','#00ffcc','#ff9500','#ffffff'];

  /* ── Debug-Log (wie index.html: an /api/log) ── */
  function dbg(...a){
    const msg = a.map(x => typeof x==='object'?JSON.stringify(x):String(x)).join(' ');
    const el = document.getElementById('dbg-log');
    if (el){ const d=document.createElement('div'); d.textContent=new Date().toLocaleTimeString()+'  '+msg;
      el.appendChild(d); while(el.childNodes.length>50) el.removeChild(el.firstChild); el.scrollTop=el.scrollHeight; }
    try { navigator.sendBeacon('/api/log', '[8thwall] '+msg); } catch(_){}
  }
  window.addEventListener('error', e => dbg('JS ERROR:', e.message, '@', (e.filename||'')+':'+(e.lineno||'')));
  window.addEventListener('unhandledrejection', e => dbg('REJECT:', (e.reason&&(e.reason.message||e.reason))||'?'));

  /* ── Handabdruck-Canvas (aus index.html übernommen) ── */
  function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
  function drawOneHand(ctx,cx,cy,s,color){
    ctx.save();ctx.translate(cx,cy);ctx.shadowColor=color;ctx.shadowBlur=18;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(0,0,s*0.38,s*0.40,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,s*0.48,s*0.22,s*0.14,0,0,Math.PI*2);ctx.fill();
    const fX=[-0.23,-0.08,0.08,0.23],fLen=[0.46,0.52,0.48,0.36],fW=[0.085,0.095,0.085,0.070];
    for(let i=0;i<4;i++){const topY=-s*0.38-s*fLen[i],midY=-s*0.38-s*fLen[i]/2;
      ctx.beginPath();ctx.ellipse(fX[i]*s,midY,fW[i]*s,s*fLen[i]/2+s*0.05,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(fX[i]*s,topY,fW[i]*s,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.rotate(0.45);
    ctx.beginPath();ctx.ellipse(-s*0.38,-s*0.08,s*0.075,s*0.20,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-s*0.38,-s*0.27,s*0.075,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.ellipse(0,0,s*0.37,s*0.39,0,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.restore();
  }
  function makeHandCanvas(baseColor){
    const W=300,H=380,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
    grd.addColorStop(0,hexAlpha(baseColor,0.22));grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);drawOneHand(ctx,W/2,H*0.58,95,baseColor);return cv;
  }

  /* ── A-Frame Komponente: footprint (textur + glow) ── */
  AFRAME.registerComponent('footprint', {
    schema: { color: {default:'#00cfff'} },
    init(){
      const tex = new THREE.CanvasTexture(makeHandCanvas(this.data.color));
      tex.needsUpdate = true;
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent:true, opacity:0.95,
        blending: THREE.AdditiveBlending, depthWrite:false, side: THREE.DoubleSide });
      const mesh = this.el.getObject3D('mesh');
      if (mesh) mesh.material = mat;
      this.el.addEventListener('object3dset', () => {
        const m=this.el.getObject3D('mesh'); if(m) m.material=mat;
      });
    },
  });

  /* ── Tap-to-Place auf dem Boden ── */
  AFRAME.registerComponent('tap-place', {
    init(){
      const ground = document.getElementById('ground');
      ground.addEventListener('click', (e) => {
        const name = (document.getElementById('inp-name').value || '').trim();
        if (!name){ flash('Erst Namen eingeben'); document.getElementById('inp-name').focus(); return; }
        const p = e.detail.intersection.point;
        dbg('tap-place @', p.x.toFixed(2), p.z.toFixed(2));
        const fp = { id:'local-'+Date.now(), name, message:'', color: selectedColor, size:1.0,
          x:p.x, y:0, z:p.z, quat_x:0, quat_y:0, quat_z:0, quat_w:1 };
        spawnFootprint(fp);
        postFootprint(fp);
        flash('Abdruck platziert');
      });
    },
  });

  let selectedColor = COLORS[0];
  const rendered = new Set();

  function spawnFootprint(fp){
    if (rendered.has(fp.id)) return;
    rendered.add(fp.id);
    const W = HAND_W, H = W*(380/300);
    const wrap = document.createElement('a-entity');
    wrap.setAttribute('position', `${fp.x} 0.02 ${fp.z}`);
    const plane = document.createElement('a-plane');
    plane.setAttribute('width', W);
    plane.setAttribute('height', H);
    plane.setAttribute('rotation', '-90 0 0');
    plane.setAttribute('footprint', `color: ${fp.color || '#00cfff'}`);
    wrap.appendChild(plane);
    // Name-Label
    const txt = document.createElement('a-text');
    txt.setAttribute('value', fp.name || '');
    txt.setAttribute('align', 'center');
    txt.setAttribute('color', fp.color || '#00cfff');
    txt.setAttribute('position', `0 ${H*0.7} 0`);
    txt.setAttribute('rotation', '-90 0 0');
    txt.setAttribute('width', 6);
    wrap.appendChild(txt);
    document.getElementById('fp-root').appendChild(wrap);
  }

  async function postFootprint(fp){
    try {
      const res = await fetch(`/api/footprints/${EXHIBITION_ID}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:fp.name, message:'', color:fp.color, size:1.0,
          x:fp.x, y:0, z:fp.z, quat_x:0, quat_y:0, quat_z:0, quat_w:1 }),
      });
      dbg('POST status=', res.status);
    } catch(e){ dbg('POST FAIL:', e&&e.message); }
  }

  async function loadFootprints(){
    try {
      const data = await fetch(`/api/footprints/${EXHIBITION_ID}`).then(r=>r.json());
      data.forEach(d => spawnFootprint({ ...d, id: d.id }));
      const b=document.getElementById('count'); if(b) b.textContent = `${data.length} Abdrücke`;
    } catch(e){ dbg('load err:', e&&e.message); }
  }

  let flashTimer=null;
  function flash(msg){
    const el=document.getElementById('toast'); if(!el) return;
    el.textContent=msg; el.style.opacity='1';
    clearTimeout(flashTimer); flashTimer=setTimeout(()=>el.style.opacity='0',1800);
  }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
    #ui { position:fixed; inset:0; z-index:100; pointer-events:none; }
    #bar { position:fixed; top:0; left:0; right:0; pointer-events:auto;
      background:rgba(4,6,24,0.92); backdrop-filter:blur(8px);
      padding:8px 12px; display:flex; flex-direction:column; gap:8px;
      border-bottom:1px solid rgba(0,200,255,0.25); }
    #bar .row { display:flex; gap:8px; align-items:center; }
    #bar h1 { font-size:14px; color:#a0e4ff; flex:1; }
    #version { font:11px/1 monospace; color:#3a6; }
    #inp-name { flex:1; min-width:0; background:rgba(0,200,255,0.06);
      border:1px solid rgba(0,200,255,0.2); border-radius:8px; padding:8px 10px;
      color:#cef; font-size:max(16px,14px); }
    .colors { display:flex; gap:5px; flex-wrap:wrap; }
    .cb { width:24px; height:24px; border-radius:50%; border:2px solid transparent; }
    .cb.on { border-color:#fff; box-shadow:0 0 8px currentColor; }
    #toast { position:fixed; top:120px; left:50%; transform:translateX(-50%); z-index:200;
      background:rgba(0,180,120,0.92); color:#fff; padding:8px 18px; border-radius:18px;
      font-size:14px; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
    #dbg-log { position:fixed; bottom:0; left:0; right:0; z-index:150; max-height:28vh;
      overflow-y:auto; pointer-events:auto; background:rgba(0,0,0,0.82); color:#5f8;
      font:10px/1.4 monospace; padding:6px 8px; white-space:pre-wrap; word-break:break-word; }
  </style>
</head>
<body>

<div id="ui">
  <div id="bar">
    <div class="row">
      <h1>Hambacher Schloss - AR</h1>
      <span id="count">0 Abdrücke</span>
      <span id="version">w1</span>
    </div>
    <div class="row">
      <input id="inp-name" type="text" placeholder="Dein Name *" maxlength="20">
      <div class="colors" id="colors"></div>
    </div>
  </div>
  <div id="toast"></div>
</div>
<div id="dbg-log"></div>

<a-scene
  tap-place
  landing-page
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement: true"
  xrweb="allowedDevices: any">

  <a-camera
    id="camera"
    position="0 8 0"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse">
  </a-camera>

  <a-light type="ambient" intensity="1.0"></a-light>

  <!-- Abdrücke -->
  <a-entity id="fp-root"></a-entity>

  <!-- unsichtbarer Boden zum Antippen (Raycast-Ziel) -->
  <a-entity
    id="ground"
    class="cantap"
    geometry="primitive: plane; width: 1000; height: 1000"
    rotation="-90 0 0"
    position="0 0 0"
    material="shader: flat; transparent: true; opacity: 0">
  </a-entity>
</a-scene>

<script>
  document.getElementById('version').textContent = APP_VERSION;
  dbg('=== ' + APP_VERSION + ' === UA:', navigator.userAgent);

  // Farbauswahl
  const colorsEl = document.getElementById('colors');
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cb' + (c===selectedColor?' on':'');
    b.style.background = c; b.style.color = c;
    b.onclick = () => { document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));
      b.classList.add('on'); selectedColor = c; };
    colorsEl.appendChild(b);
  });

  const sceneEl = document.querySelector('a-scene');
  sceneEl.addEventListener('realityready', () => { dbg('8thwall: realityready (Tracking läuft)'); loadFootprints(); setInterval(loadFootprints, 7000); });
  sceneEl.addEventListener('loaded', () => dbg('scene loaded'));
</script>

</body>
</html>
