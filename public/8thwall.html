<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hambacher Schloss - Digitale Handabdrücke</title>

  <!-- 8th Wall (Open Source, gratis, kein Key): World-Tracking iOS + Android.
       8-Frame lokal, Engine/xrextras/landing-page via CDN. -->
  <script crossorigin="anonymous" src="./vendor/8frame-1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true" data-preload-chunks="slam"></script>

  <script>
  /* ════════ Konfiguration ════════ */
  const APP_VERSION   = 'w8 · stage2-tracking';
  const EXHIBITION_ID = '1';
  const HAND_W        = 0.25;                // Meter (absolute Skalierung = wie Android)
  const PLACE_MIN = 0.5, PLACE_MAX = 4.0;     // Reticle-Distanz in Metern
  const COLORS = ['#00cfff','#ff3dac','#39ff14','#ff6b00','#bf00ff','#ffec00','#ff2244','#00ffcc','#ff9500','#ffffff'];
  let   selectedColor = COLORS[0];
  const rendered = new Set();
  let firstLoadDone = false;   // Spawn-Welle erst nach Erst-Load
  const HAND_TEX = new Map();
  function handTexture(col){ if(!HAND_TEX.has(col)) HAND_TEX.set(col, new THREE.CanvasTexture(makeHandCanvas(col))); return HAND_TEX.get(col); }

  /* ════════ Debug-Log ════════ */
  function dbg(...a){
    const msg = a.map(x => typeof x==='object'?JSON.stringify(x):String(x)).join(' ');
    const el = document.getElementById('dbg-log');
    if (el){ const d=document.createElement('div'); d.textContent=new Date().toLocaleTimeString()+'  '+msg;
      el.appendChild(d); while(el.childNodes.length>60) el.removeChild(el.firstChild); el.scrollTop=el.scrollHeight; }
    try { navigator.sendBeacon('/api/log', '[8w] '+msg); } catch(_){}
  }
  window.addEventListener('error', e => dbg('JS ERROR:', e.message, '@', (e.filename||'')+':'+(e.lineno||'')));
  window.addEventListener('unhandledrejection', e => dbg('REJECT:', (e.reason&&(e.reason.message||e.reason))||'?'));

  /* ════════ Handabdruck-Canvas (aus index.html) ════════ */
  function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}
  function drawOneHand(ctx,cx,cy,s,color){
    ctx.save();ctx.translate(cx,cy);ctx.shadowColor=color;ctx.shadowBlur=18;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(0,0,s*0.38,s*0.40,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,s*0.48,s*0.22,s*0.14,0,0,Math.PI*2);ctx.fill();
    const fX=[-0.23,-0.08,0.08,0.23],fLen=[0.46,0.52,0.48,0.36],fW=[0.085,0.095,0.085,0.070];
    for(let i=0;i<4;i++){const topY=-s*0.38-s*fLen[i],midY=-s*0.38-s*fLen[i]/2;
      ctx.beginPath();ctx.ellipse(fX[i]*s,midY,fW[i]*s,s*fLen[i]/2+s*0.05,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(fX[i]*s,topY,fW[i]*s,0,Math.PI*2);ctx.fill();}
    ctx.save();ctx.rotate(0.45);
    ctx.beginPath();ctx.ellipse(-s*0.38,-s*0.08,s*0.075,s*0.20,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-s*0.38,-s*0.27,s*0.075,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.globalAlpha=0.5;
    ctx.beginPath();ctx.ellipse(0,0,s*0.37,s*0.39,0,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;ctx.restore();
  }
  function makeHandCanvas(baseColor){
    const W=300,H=380,cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);
    const grd=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W/2);
    grd.addColorStop(0,hexAlpha(baseColor,0.22));grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);drawOneHand(ctx,W/2,H*0.58,95,baseColor);return cv;
  }

  /* ════════ Hologramm-Shader + Komponenten (Stil wie Android) ════════ */
  const HOLO_VERT = `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`;
  const HOLO_FRAG = `precision highp float; uniform float time; uniform vec3 glowColor; uniform sampler2D footTex; varying vec2 vUv;
    void main(){
      vec4 tex=texture2D(footTex,vUv); if(tex.a<0.04) discard;
      float scan=sin(vUv.y*90.0-time*5.5)*0.5+0.5; scan=0.55+pow(scan,2.5)*0.45;
      float sp=fract(time*0.28); float sw=smoothstep(0.0,0.06,fract(vUv.y-sp))*smoothstep(0.16,0.06,fract(vUv.y-sp));
      float pulse=sin(time*2.1)*0.08+0.92; float flicker=sin(time*61.3)*sin(time*19.7)*0.04+0.96;
      float ex=1.0-abs(vUv.x-0.5)*2.0; float ey=1.0-abs(vUv.y-0.5)*2.0; float rim=pow(1.0-min(ex,ey),3.5)*0.6;
      vec3 col=glowColor*(scan+rim)+vec3(sw*0.55); float alpha=tex.a*scan*pulse*flicker;
      gl_FragColor=vec4(col,alpha);
    }`;
  AFRAME.registerComponent('holo-mat', {
    schema: { color:{default:'#00bfff'} },
    init(){
      this.uniforms={ time:{value:0}, glowColor:{value:new THREE.Color(this.data.color)}, footTex:{value:new THREE.Texture()} };
      this.mat=new THREE.ShaderMaterial({ uniforms:this.uniforms, vertexShader:HOLO_VERT, fragmentShader:HOLO_FRAG,
        transparent:true, blending:THREE.AdditiveBlending, side:THREE.DoubleSide, depthWrite:false });
      this._apply(); this.el.addEventListener('object3dset', () => this._apply());
    },
    _apply(){ const m=this.el.getObject3D('mesh'); if(m) m.traverse(c=>{ if(c.isMesh) c.material=this.mat; }); },
    setTexture(canvasOrTex){ const t=canvasOrTex.isTexture?canvasOrTex:new THREE.CanvasTexture(canvasOrTex);
      t.needsUpdate=true; this.uniforms.footTex.value=t; },
    update(){ this.uniforms.glowColor.value.set(this.data.color); },
    tick(t){ this.uniforms.time.value=t/1000; },
  });
  AFRAME.registerComponent('pulse-ring', {
    schema: { color:{default:'#00bfff'}, r:{default:0.3} },
    init(){
      this.mat=new THREE.MeshBasicMaterial({ color:new THREE.Color(this.data.color), transparent:true,
        opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false });
      const ring=new THREE.Mesh(new THREE.TorusGeometry(this.data.r, this.data.r*0.04, 8, 80), this.mat);
      ring.rotation.x=-Math.PI/2; ring.position.y=0.01; this.el.object3D.add(ring); this._ring=ring;
    },
    tick(t){ const f=t/1000; const s=1.0+Math.sin(f*2.6)*0.07; this._ring.scale.set(s,s,s);
      this.mat.opacity=0.35+Math.sin(f*2.6+1.0)*0.35; },
  });
  AFRAME.registerComponent('billboard', {
    init(){ this._v=new THREE.Vector3(); this._p=new THREE.Vector3(); },
    tick(){ try{ const cam=document.getElementById('camera'); if(!cam) return;
      cam.object3D.getWorldPosition(this._v); this.el.object3D.lookAt(this._v);
      // Label-Fade: ab 4 m Distanz ausblenden
      this.el.object3D.getWorldPosition(this._p);
      this.el.object3D.visible = this._v.distanceTo(this._p) < 4; }
      catch(e){ if(!this._err){ this._err=true; dbg('billboard:', e&&e.message); } } },
  });

  /* ════════ Component: reticle-follow ════════
     Legt das Vorschau-Reticle pro Frame auf den Boden vor der Kamera
     (Bildmitte -> Boden y=0, Distanz geklemmt). Nur im Platzier-/Kalibrier-Modus. */
  AFRAME.registerComponent('reticle-follow', {
    init(){ this._ray = new THREE.Raycaster();
            this._plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
            this._v = new THREE.Vector3(); this._cp = new THREE.Vector3(); this._fwd = new THREE.Vector3(); },
    tick(){
      try {
        const show = (typeof placeModeActive!=='undefined' && placeModeActive)
                  || (typeof calibMode!=='undefined' && calibMode);
        const reticle = document.getElementById('reticle');
        if (!reticle) return;
        if (!show){ reticle.setAttribute('visible', false); return; }
        const camEl = document.getElementById('camera');
        const cam = camEl && camEl.getObject3D('camera');
        if (!cam) return;
        cam.getWorldPosition(this._cp);
        const pt = this._v;
        let placedY = 0.02, viaHitTest = false;

        // Bevorzugt: echter 8th-Wall-Hit-Test (geschätzte/erkannte Flächen,
        // korrekt auch auf Podesten/Treppen). Feature-Detection: API liegt im
        // SLAM-Chunk und ist evtl. nicht auf jedem Gerät vorhanden.
        if (window.XR8 && XR8.XrController && typeof XR8.XrController.hitTest === 'function') {
          try {
            const hits = XR8.XrController.hitTest(0.5, 0.5,
              ['DETECTED_SURFACE', 'ESTIMATED_SURFACE', 'FEATURE_POINT']);
            if (hits && hits.length && hits[0].position) {
              const h = hits[0].position;
              const hd = this._cp.distanceTo(pt.set(h.x, h.y, h.z));
              if (hd >= PLACE_MIN && hd <= PLACE_MAX) { placedY = h.y + 0.02; viaHitTest = true; }
            }
            if (!this._htLogged) { this._htLogged = true; dbg('xr8.hitTest verfügbar'); }
          } catch (e) {
            if (!this._htErr) { this._htErr = true; dbg('xr8.hitTest err:', e && e.message); }
          }
        } else if (!this._htMissLogged) {
          this._htMissLogged = true; dbg('xr8.hitTest fehlt – nutze Mathe-Ebene y=0');
        }

        if (!viaHitTest) {
          // Fallback: ideale Bodenebene y=0 (8th Wall legt den geschätzten
          // Boden bei absolute scale auf y=0)
          this._ray.setFromCamera({x:0,y:0}, cam);
          let ok = this._ray.ray.intersectPlane(this._plane, pt);
          cam.getWorldDirection(this._fwd); this._fwd.y = 0;
          if (this._fwd.lengthSq() < 1e-4) this._fwd.set(0,0,-1); else this._fwd.normalize();
          let d = ok ? this._cp.distanceTo(pt) : Infinity;
          if (!ok || d > PLACE_MAX || pt.y > this._cp.y) {
            pt.copy(this._cp).addScaledVector(this._fwd, 1.5); pt.y = 0;
          } else if (d < PLACE_MIN) {
            pt.copy(this._cp).addScaledVector(this._fwd, PLACE_MIN); pt.y = 0;
          }
        }
        reticle.object3D.position.set(pt.x, placedY, pt.z);
        reticle.setAttribute('visible', true);
        this._last = { x:pt.x, y: viaHitTest ? placedY : 0, z:pt.z };
        window._reticlePt = this._last;
      } catch(e){ if(!this._err){ this._err=true; dbg('reticle tick err:', e&&e.message); } }
    },
  });

  /* ════════ Abdruck einsetzen (Holo-Stil wie Android) ════════ */
  function spawnFootprint(fp){
    if (rendered.has(fp.id)) return;
    rendered.add(fp.id);
    const W = HAND_W, H = W*(380/300), col = fp.color || '#00cfff';
    const wrap = document.createElement('a-entity');
    wrap.setAttribute("position", `${fp.x} ${(fp.y||0)+0.03} ${fp.z}`);
    wrap.setAttribute('animation__spawn','property: scale; from: 0 0 0; to: 1 1 1; dur: 600; easing: easeOutElastic');

    // Holo-Hand flach auf Boden
    const plane = document.createElement('a-plane');
    plane.setAttribute('width', W); plane.setAttribute('height', H);
    plane.setAttribute('rotation', '-90 0 0'); plane.setAttribute('position', '0 0.01 0');
    plane.setAttribute('class', 'fp-plane');
    plane.setAttribute('holo-mat', `color: ${col}`);
    plane.addEventListener('loaded', () => { const c=plane.components['holo-mat']; if(c) c.setTexture(handTexture(col)); });
    plane.addEventListener('click', () => { if(!placeModeActive && !calibMode && !popupOpen) showPopup(fp); });
    wrap.appendChild(plane);

    // Pulsierender Glow-Ring
    const ring = document.createElement('a-entity');
    ring.setAttribute('pulse-ring', `color: ${col}; r: ${0.64*W}`);
    wrap.appendChild(ring);

    // Äußerer statischer Ring
    const outer = document.createElement('a-torus');
    outer.setAttribute('radius', 0.78*W); outer.setAttribute('radius-tubular', 0.05*W*0.6);
    outer.setAttribute('rotation','-90 0 0'); outer.setAttribute('position','0 0.008 0');
    outer.setAttribute('material', `color: ${col}; transparent: true; opacity: 0.25; emissive: ${col}; emissiveIntensity: 0.8; blending: additive; depthWrite: false`);
    wrap.appendChild(outer);

    // Name-Label (Billboard, schwebt über dem Abdruck)
    const label = document.createElement('a-entity');
    label.setAttribute('position', `0 ${0.95*W} 0`);
    label.setAttribute('billboard', '');
    const lblName = document.createElement('a-text');
    lblName.setAttribute('value', fp.name || ''); lblName.setAttribute('align', 'center');
    lblName.setAttribute('color', col);
    lblName.setAttribute('width', Math.min(1.0, 0.3 + (fp.name||'').length*0.03));  // Meter
    lblName.setAttribute('wrap-count', 20);
    label.appendChild(lblName);
    wrap.appendChild(label);

    // Spawn-Welle (nur für neu erscheinende Abdrücke, nicht beim Erst-Load)
    if (firstLoadDone) {
      const wave = document.createElement('a-entity');
      const wt = document.createElement('a-torus');
      wt.setAttribute('radius', 0.19); wt.setAttribute('radius-tubular', 0.005);
      wt.setAttribute('rotation', '-90 0 0');
      wt.setAttribute('material', `color: ${col}; transparent: true; opacity: 0.8; blending: additive; depthWrite: false`);
      wt.setAttribute('animation__o', 'property: material.opacity; from: 0.8; to: 0; dur: 650; easing: linear');
      wave.appendChild(wt);
      wave.setAttribute('animation__s', 'property: scale; from: 0.2 0.2 0.2; to: 3 3 3; dur: 650; easing: easeOutQuad');
      wrap.appendChild(wave);
      setTimeout(() => { try { wrap.removeChild(wave); } catch (_) {} }, 800);
    }

    document.getElementById('fp-root').appendChild(wrap);
  }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; color:#eee; }
    #ui { position:fixed; inset:0; z-index:100; pointer-events:none; display:flex; flex-direction:column; }
    #header { pointer-events:auto; background:rgba(4,4,20,0.92); backdrop-filter:blur(8px);
      padding:10px 14px; display:flex; align-items:center; gap:10px; border-bottom:1px solid rgba(0,200,255,0.25); }
    #header h1 { font-size:15px; color:#a0e4ff; flex:1; }
    #count { font-size:12px; color:#7af; }
    #version { font:11px/1 monospace; color:#3a6; }
    .ar-stage { flex:1; position:relative; }
    #status { position:absolute; top:12px; left:50%; transform:translateX(-50%); max-width:90vw; text-align:center;
      padding:7px 14px; border-radius:14px; font-size:13px; font-weight:600; color:#fff;
      background:rgba(0,10,30,0.7); white-space:nowrap; }
    #toast { position:absolute; top:54px; left:50%; transform:translateX(-50%);
      background:rgba(0,180,120,0.92); color:#fff; padding:8px 20px; border-radius:18px; font-size:14px;
      opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
    #calib-btn, #recenter-btn { position:absolute; bottom:12px; pointer-events:auto;
      background:rgba(0,10,30,0.75); border:1px solid rgba(0,200,255,0.25); border-radius:10px;
      padding:6px 12px; font-size:12px; color:#7af; }
    #calib-btn { right:12px; }
    #recenter-btn { left:12px; }

    #sheet { position:fixed; left:0; right:0; bottom:0; z-index:200; pointer-events:auto;
      background:rgba(4,6,24,0.97); backdrop-filter:blur(20px); border-radius:20px 20px 0 0;
      border-top:1px solid rgba(0,200,255,0.18); transition:transform .35s cubic-bezier(0.32,0.72,0,1);
      padding-bottom:max(env(safe-area-inset-bottom),10px); }
    #sheet.collapsed { transform:translateY(calc(100% - 58px)); }
    #sheet-peek { display:flex; align-items:center; gap:10px; padding:14px 16px 8px; cursor:pointer; }
    #sheet-peek b { flex:1; font-size:14px; color:#7af; }
    #sheet-peek span { font-size:12px; color:#446; }
    #sheet-body { padding:4px 16px 12px; }
    .row { display:flex; gap:8px; margin-bottom:10px; }
    input[type=text] { flex:1; min-width:0; background:rgba(0,200,255,0.05); border:1px solid rgba(0,200,255,0.15);
      border-radius:10px; padding:10px 13px; color:#cef; font-size:max(16px,15px); }
    input[type=text].error { border-color:#f55; }
    .colors { display:grid; grid-template-columns:repeat(10,1fr); gap:6px; margin-bottom:10px; }
    .cb { aspect-ratio:1; border-radius:50%; border:2px solid transparent; }
    .cb.on { border-color:#fff; transform:scale(1.15); box-shadow:0 0 8px currentColor; }
    #add-btn { width:100%; padding:13px; background:linear-gradient(135deg,#0af,#09f); border:none;
      border-radius:12px; color:#001; font-weight:700; font-size:16px; min-height:48px; }

    .overlay { display:none; position:fixed; inset:0; z-index:250; pointer-events:none;
      flex-direction:column; align-items:center; justify-content:space-between;
      padding:74px 20px max(26px,env(safe-area-inset-bottom)); }
    .card { background:rgba(4,6,24,0.92); border:1px solid rgba(0,200,255,0.3); border-radius:18px;
      padding:14px 20px; text-align:center; max-width:300px; }
    .card b { font-size:14px; color:#7af; } .card div { font-size:12px; color:#9ab; line-height:1.5; margin-top:4px; }
    .btns { display:flex; gap:12px; }
    .btns button { pointer-events:auto; padding:12px 26px; border:none; border-radius:12px; font-weight:700; font-size:15px; }
    .b-cancel { background:rgba(255,60,60,0.15); border:1px solid rgba(255,60,60,0.4); color:#f88; }
    .b-go { background:linear-gradient(135deg,#0af,#09f); color:#001; }
    .b-anchor { background:linear-gradient(135deg,#0fc,#0a9); color:#001; }

    #popup-backdrop { display:none; position:fixed; inset:0; z-index:290; pointer-events:auto; background:transparent; }
    #msg-popup { display:none; position:fixed; z-index:300; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(4,6,24,0.97); border:1px solid rgba(0,200,255,0.25); border-radius:16px;
      padding:16px 22px; min-width:220px; max-width:80vw; text-align:center; pointer-events:auto; }
    #popup-name { font-size:16px; font-weight:700; color:#7af; margin-bottom:6px; }
    #popup-msg { font-size:14px; color:#cef; line-height:1.5; }
    #popup-close { margin-top:12px; padding:6px 18px; background:rgba(0,200,255,0.12);
      border:1px solid rgba(0,200,255,0.2); border-radius:8px; color:#7af; font-size:13px; }
    #dbg-toggle { pointer-events:auto; background:rgba(0,200,255,0.1); border:1px solid rgba(0,200,255,0.3);
      color:#7af; font-size:11px; border-radius:8px; padding:4px 9px; }
    #dbg-log { display:none; position:fixed; top:50px; left:6px; right:6px; z-index:400; max-height:34vh;
      overflow-y:auto; pointer-events:auto; background:rgba(0,0,0,0.82); color:#5f8;
      font:10px/1.4 monospace; padding:6px 8px; white-space:pre-wrap; word-break:break-word; border-radius:8px; }
  </style>
</head>
<body>

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  reticle-follow
  renderer="colorManagement: true; alpha: true"
  xrweb="allowedDevices: any; scale: absolute">

  <a-camera id="camera" position="0 1.6 0"
    raycaster="objects: .fp-plane; far: 100"
    cursor="fuse: false; rayOrigin: mouse"></a-camera>

  <a-light type="ambient" intensity="1.0"></a-light>

  <a-entity id="fp-root"></a-entity>

  <!-- Vorschau-Hand (Holo-Stil) -->
  <a-entity id="reticle" visible="false">
    <a-plane id="reticle-hand" width="0.25" height="0.316" rotation="-90 0 0"
             position="0 0.02 0" holo-mat="color: #00ffcc"></a-plane>
  </a-entity>

  <!-- unsichtbarer Boden (nur falls gebraucht) -->
  <a-entity id="ground" class="cantap-ground"
    geometry="primitive: plane; width: 2000; height: 2000" rotation="-90 0 0"
    position="0 0 0" material="shader: flat; transparent: true; opacity: 0"></a-entity>
</a-scene>

<div id="ui">
  <div id="header">
    <h1>Hambacher Schloss</h1>
    <span id="count">0</span>
    <span id="version">w2</span>
    <button id="dbg-toggle">Log</button>
  </div>
  <div id="dbg-log"></div>

  <div class="ar-stage">
    <div id="status" style="display:none"></div>
    <div id="toast"></div>
    <button id="recenter-btn" style="display:none">Neu zentrieren</button>
    <button id="calib-btn" style="display:none">Kalibrieren</button>
  </div>

  <div id="sheet" class="collapsed">
    <div id="sheet-peek"><b>Handabdruck hinterlassen</b><span id="peek-count">0 Abdrücke</span></div>
    <div id="sheet-body">
      <div class="row">
        <input type="text" id="inp-name" placeholder="Dein Name *" maxlength="20">
        <input type="text" id="inp-msg" placeholder="Nachricht (optional)" maxlength="36">
      </div>
      <div class="colors" id="colors"></div>
      <button id="add-btn">Handabdruck hinterlassen</button>
    </div>
  </div>

  <!-- Platzier-Overlay -->
  <div class="overlay" id="place-overlay">
    <div class="card"><b>Hand positionieren</b><div>Richte das Handy auf den Boden vor dir,<br>dann "Platzieren".</div></div>
    <div class="btns">
      <button class="b-cancel" id="place-cancel">Abbrechen</button>
      <button class="b-go" id="place-confirm">Platzieren</button>
    </div>
  </div>

  <!-- Kalibrier-Overlay -->
  <div class="overlay" id="calib-overlay">
    <div class="card"><b>Referenzpunkt wählen</b><div>Richte das Handy auf den Boden,<br>wo die Abdrücke zentriert sein sollen.</div></div>
    <div class="btns">
      <button class="b-cancel" id="calib-skip">Überspringen</button>
      <button class="b-anchor" id="calib-confirm">Verankern</button>
    </div>
  </div>

  <div id="popup-backdrop"></div>
  <div id="msg-popup">
    <div id="popup-name"></div>
    <div id="popup-msg"></div>
    <button id="popup-close">Schließen</button>
  </div>
</div>

<script>
/* ════════ Status / Anchor / Platzierung / Kalibrierung ════════ */
const sceneEl = document.querySelector('a-scene');
let placeModeActive = false, calibMode = false, pendingFp = null, popupOpen = false, anchorSet = false;

document.getElementById('version').textContent = APP_VERSION;
dbg('=== ' + APP_VERSION + ' === UA:', navigator.userAgent);

function setStatus(text, ok){
  const s=document.getElementById('status');
  if(!text){ s.style.display='none'; return; }
  s.style.display='block'; s.textContent=text;
  s.style.background = ok ? 'rgba(0,170,90,0.92)' : 'rgba(210,120,40,0.92)';
}
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.opacity='1';
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.style.opacity='0',2000); }

/* Welt -> relativ zum Anchor (#fp-root), inkl. Höhe (Podeste via hitTest) */
function worldToAnchorLocal(px,pz,py){
  const root=document.getElementById('fp-root').object3D; root.updateMatrixWorld(true);
  const w=new THREE.Vector3(px,py||0,pz);
  const l=root.worldToLocal(w.clone());
  return { x:l.x, y:l.y, z:l.z };
}
function setAnchor(px,pz){
  const root=document.getElementById('fp-root').object3D;
  root.position.set(px,0,pz); root.updateMatrixWorld(true); anchorSet=true;
  dbg('anchor-set', px.toFixed(2), pz.toFixed(2));
}

/* ── Reticle-Punkt holen (vom reticle-follow tick) ── */
function reticlePoint(){ return window._reticlePt || null; }

/* ── Platzieren ── */
async function confirmPlacement(){
  if(!placeModeActive || !pendingFp) return;
  const pt = reticlePoint();
  if(!pt){ dbg('place: kein Reticle-Punkt'); return; }
  placeModeActive=false;
  document.getElementById('place-overlay').style.display='none';
  const rel = worldToAnchorLocal(pt.x, pt.z, pt.y || 0);
  dbg('place world', pt.x.toFixed(2), (pt.y||0).toFixed(2), pt.z.toFixed(2),
      'rel', rel.x.toFixed(2), rel.y.toFixed(2), rel.z.toFixed(2));
  spawnFootprint({ id:'local-'+Date.now(), name:pendingFp.name, message:pendingFp.message,
    color:pendingFp.color, x:rel.x, y:rel.y, z:rel.z });
  try {
    const res=await fetch(`/api/footprints/${EXHIBITION_ID}`,{ method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ name:pendingFp.name, message:pendingFp.message, color:pendingFp.color,
        size:1.0, x:rel.x, y:rel.y, z:rel.z, quat_x:0, quat_y:0, quat_z:0, quat_w:1 }) });
    dbg('POST status=', res.status);
  } catch(e){ dbg('POST FAIL:', e&&e.message); }
  pendingFp=null; toast('Abdruck platziert');
}

/* Vorschau-Hand (Reticle) auf Farbe setzen */
function setReticleHand(col){
  const p=document.getElementById('reticle-hand');
  p.setAttribute('holo-mat', `color: ${col}`);
  const c=p.components && p.components['holo-mat'];
  if (c) c.setTexture(handTexture(col));
}

/* ── Kalibrierung ── */
function startCalibration(){ calibMode=true; placeModeActive=false;
  setReticleHand('#00ffcc');
  document.getElementById('place-overlay').style.display='none';
  document.getElementById('calib-overlay').style.display='flex'; dbg('calib gestartet'); }
function endCalibration(){ calibMode=false; document.getElementById('calib-overlay').style.display='none'; }

document.getElementById('calib-btn').onclick = startCalibration;

/* Neu zentrieren: setzt den Welt-Ursprung auf die aktuelle Geräteposition
   (gegen aufgelaufenen SLAM-Drift). */
document.getElementById('recenter-btn').onclick = () => {
  try { if (window.XR8 && XR8.XrController && XR8.XrController.recenter) { XR8.XrController.recenter(); dbg('recenter()'); toast('Neu zentriert'); } }
  catch(e){ dbg('recenter err:', e&&e.message); }
};

/* iOS: Bewegungssensor (IMU) freigeben — ohne IMU trackt 8th Wall nur per
   Kamera und driftet stark. Muss in einer User-Geste passieren. */
function requestMotionPerm(){
  try { if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function')
    DeviceMotionEvent.requestPermission().then(s => dbg('motion-perm:', s)).catch(()=>{}); } catch(_){}
  try { if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function')
    DeviceOrientationEvent.requestPermission().catch(()=>{}); } catch(_){}
}
document.addEventListener('touchend', requestMotionPerm, { once: true });
document.addEventListener('click',    requestMotionPerm, { once: true });
document.getElementById('calib-confirm').onclick = () => {
  const pt=reticlePoint(); if(!pt){ dbg('calib: kein Punkt'); return; }
  setAnchor(pt.x, pt.z); endCalibration(); toast('Verankert'); loadFootprints();
};
document.getElementById('calib-skip').onclick = endCalibration;

/* ── Platzier-Button im Sheet ── */
document.getElementById('add-btn').onclick = () => {
  const nameEl=document.getElementById('inp-name'); const name=(nameEl.value||'').trim();
  if(!name){ nameEl.classList.add('error'); nameEl.focus(); setTimeout(()=>nameEl.classList.remove('error'),900); return; }
  pendingFp={ name, message:(document.getElementById('inp-msg').value||'').trim(), color:selectedColor };
  setReticleHand(selectedColor);
  nameEl.value=''; document.getElementById('inp-msg').value='';
  document.getElementById('sheet').classList.add('collapsed');
  endCalibration();
  placeModeActive=true;
  document.getElementById('place-overlay').style.display='flex';
  dbg('add-btn -> place-mode');
};
document.getElementById('place-confirm').onclick = confirmPlacement;
document.getElementById('place-cancel').onclick = () => { placeModeActive=false; pendingFp=null;
  document.getElementById('place-overlay').style.display='none'; };

/* ── Popup ── */
let popupTimer=null, popupGuard=null;
function showPopup(fp){ document.getElementById('popup-name').textContent=fp.name;
  document.getElementById('popup-msg').textContent=fp.message||'(Keine Nachricht)';
  document.getElementById('popup-backdrop').style.display='block';
  document.getElementById('msg-popup').style.display='block'; popupOpen=true;
  clearTimeout(popupTimer); popupTimer=setTimeout(hidePopup,5000); }
function hidePopup(){ document.getElementById('msg-popup').style.display='none';
  document.getElementById('popup-backdrop').style.display='none';
  clearTimeout(popupTimer); clearTimeout(popupGuard); popupGuard=setTimeout(()=>popupOpen=false,400); }
document.getElementById('popup-close').onclick = hidePopup;
document.getElementById('popup-backdrop').onclick = hidePopup;

/* ── Sheet aufklappen ── */
document.getElementById('sheet-peek').onclick = () => document.getElementById('sheet').classList.toggle('collapsed');
document.getElementById('dbg-toggle').onclick = () => { const e=document.getElementById('dbg-log');
  e.style.display = e.style.display==='block' ? 'none' : 'block'; };

/* ── Farben ── */
const colorsEl=document.getElementById('colors');
COLORS.forEach(c => { const b=document.createElement('button');
  b.className='cb'+(c===selectedColor?' on':''); b.style.background=c; b.style.color=c;
  b.onclick=()=>{ document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on')); b.classList.add('on'); selectedColor=c; };
  colorsEl.appendChild(b); });

/* ── Abdrücke laden ── */
async function loadFootprints(){
  try {
    const data=await fetch(`/api/footprints/${EXHIBITION_ID}`).then(r=>r.json());
    data.forEach(d => spawnFootprint({ id:d.id, name:d.name, message:d.message, color:d.color, x:d.x, y:d.y, z:d.z }));
    firstLoadDone = true;
    document.getElementById('count').textContent=data.length;
    document.getElementById('peek-count').textContent=`${data.length} Abdrücke`;
  } catch(e){ dbg('load err:', e&&e.message); }
}

/* ── Tracking-Status überwachen (LIMITED = Verlust-Hinweis statt stillem Drift) ── */
function installTrackMonitor(){
  try {
    if (!window.XR8 || !XR8.addCameraPipelineModule) { dbg('track-monitor: XR8 fehlt'); return; }
    XR8.addCameraPipelineModule({
      name: 'track-monitor',
      onUpdate: ({ processCpuResult }) => {
        const r = processCpuResult && processCpuResult.reality;
        if (!r || !r.trackingStatus) return;
        if (r.trackingStatus !== window._lastTrack) {
          window._lastTrack = r.trackingStatus;
          dbg('trackingStatus:', r.trackingStatus, r.trackingReason || '');
          if (r.trackingStatus === 'LIMITED') {
            setStatus('Tracking eingeschränkt – langsam bewegen, mehr Licht', false);
          } else if (r.trackingStatus === 'NORMAL') {
            setStatus('Tracking stabil', true);
            setTimeout(() => setStatus(''), 1500);
          }
        }
      },
    });
    dbg('track-monitor installiert');
  } catch (e) { dbg('track-monitor err:', e && e.message); }
}

/* ── Start, wenn Tracking läuft ── */
sceneEl.addEventListener('realityready', () => {
  dbg('realityready (Tracking läuft)');
  setStatus('Tracking aktiv. Langsam bewegen. Driftet? Neu zentrieren.', true);
  document.getElementById('calib-btn').style.display='block';
  document.getElementById('recenter-btn').style.display='block';
  installTrackMonitor();
  loadFootprints(); setInterval(loadFootprints, 7000);
  setTimeout(()=>setStatus(''), 5000);
});
sceneEl.addEventListener('realityerror', e => { dbg('realityerror:', e&&e.message); setStatus('AR-Fehler – Seite neu laden', false); });
</script>

</body>
</html>
